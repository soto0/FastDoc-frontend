image: node:22-alpine

stages:
    - install
    - format
    - test
    - build
    - deploy

cache:
    key:
        files:
            - package-lock.json
    paths:
        - node_modules/
        - .vite/
        - .npm/

workflow:
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
        - when: never

install:
    stage: install
    script:
        - echo "[INSTALL]"
        - npm ci --prefer-offline --ignore-scripts
    artifacts:
        paths:
            - node_modules/
        expire_in: 1 hour

format:
    stage: format
    variables:
        NODE_ENV: development
    script:
        - echo "[FORMAT]"
        - npm run format:check
        - npm run lint
        - npm run type-check

test:
    stage: test
    variables:
        NODE_ENV: test
    script:
        - echo "[TEST]"
        - npm run test

build:
    stage: build
    variables:
        NODE_ENV: production
    script:
        - echo "[BUILD]"
        - test -n "$VITE_API_URL"
        - npm run build
    artifacts:
        paths:
            - dist/
        expire_in: 1 hour

deploy_staging:
    stage: deploy
    variables:
        NODE_ENV: production
    script:
        - echo "[DEPLOY:STAGING]"
        - test -n "$CLOUDFLARE_ACCOUNT_ID"
        - test -n "$CLOUDFLARE_API_TOKEN"
        - npm run deploy:staging
    rules:
        - if: $CI_COMMIT_BRANCH == "develop"
    environment:
        name: staging

deploy_production:
    stage: deploy
    variables:
        NODE_ENV: production
    script:
        - echo "[DEPLOY:PRODUCTION]"
        - test -n "$CLOUDFLARE_ACCOUNT_ID"
        - test -n "$CLOUDFLARE_API_TOKEN"
        - npm run deploy:production
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
    environment:
        name: production
